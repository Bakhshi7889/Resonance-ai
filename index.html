<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Resonance</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Premium PWA Icon -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/3b82f6/r-bold.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3b82f6",
              "background-pure": "#000000",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            boxShadow: {
              glow: "0 0 30px -5px rgba(59, 130, 246, 0.6)",
              liquid: "0 10px 50px -10px rgba(0,0,0,0.95)",
            },
            animation: {
                'liquid-pulse': 'liquid-pulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite',
            },
            keyframes: {
                'liquid-pulse': {
                    '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                    '50%': { opacity: '0.8', transform: 'scale(1.05)' },
                }
            }
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #000000;
        color: white;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        user-select: none;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
        border: 0.5px solid rgba(255, 255, 255, 0.12);
      }
      
      .liquid-text {
        background: linear-gradient(to right, #ffffff 20%, #3b82f6 40%, #3b82f6 60%, #ffffff 80%);
        background-size: 200% auto;
        color: #000;
        background-clip: text;
        text-fill-color: transparent;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 4s linear infinite;
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }

      .logo-text {
        letter-spacing: -0.05em;
        text-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.24.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
