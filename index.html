<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Resonance</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=R&background=000&color=fff&size=192&font-size=0.6&rounded=true&length=1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3b82f6",
              "background-pure": "#000000",
              "liquid-glass": "rgba(255, 255, 255, 0.05)",
              "liquid-border": "rgba(255, 255, 255, 0.12)",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            boxShadow: {
              glow: "0 0 20px -5px rgba(59, 130, 246, 0.3)",
              glass: "0 8px 32px 0 rgba(0, 0, 0, 0.8)",
              liquid: "0 10px 40px -10px rgba(0,0,0,0.8)",
            },
            animation: {
                'spin-slow': 'spin 3s linear infinite',
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 6s ease-in-out infinite',
                'border-spin': 'border-spin 4s linear infinite',
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-10px)' },
                },
                'border-spin': {
                    '0%': { transform: 'rotate(0deg)' },
                    '100%': { transform: 'rotate(360deg)' }
                }
            }
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #000000;
        color: white;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        box-shadow: inset 0 0.5px 1px rgba(255, 255, 255, 0.1);
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-variation-settings: 'FILL' 1, 'wght' 200, 'GRAD' 0, 'opsz' 24;
      }
      .logo-text {
        letter-spacing: -0.05em;
      }
      ::placeholder {
        color: rgba(255, 255, 255, 0.25) !important;
      }
      
      /* Liquid border for Island */
      .processing-border {
        position: relative;
        z-index: 0;
        overflow: hidden;
      }
      .processing-border::before {
        content: '';
        position: absolute;
        z-index: -1;
        left: -50%;
        top: -50%;
        width: 200%;
        height: 200%;
        background-color: transparent;
        background-repeat: no-repeat;
        background-size: 50% 50%, 50% 50%;
        background-position: 0 0, 100% 0, 100% 100%, 0 100%;
        background-image: conic-gradient(from 0deg, transparent, #3b82f6, transparent);
        animation: border-spin 4s linear infinite;
      }
      .processing-border::after {
        content: '';
        position: absolute;
        z-index: -1;
        left: 2px;
        top: 2px;
        width: calc(100% - 4px);
        height: calc(100% - 4px);
        background: #000;
        border-radius: inherit;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.24.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
